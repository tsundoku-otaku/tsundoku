name: Lint Translation Resources

on:
  pull_request:
    paths:
      - 'i18n/src/commonMain/moko-resources/**/strings.xml'
      - 'i18n/src/commonMain/moko-resources/**/plurals.xml'
      - 'i18n-novel/src/commonMain/moko-resources/**/strings.xml'
      - 'i18n-novel/src/commonMain/moko-resources/**/plurals.xml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  xmllint:
    name: Validate XML well-formedness
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install xmllint
        run: sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: xmllint locale resources
        run: |
          set -e
          status=0
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            xmllint --noout "$f" || status=1
            echo "::endgroup::"
          done < <(find i18n/src/commonMain/moko-resources i18n-novel/src/commonMain/moko-resources -type f \( -name strings.xml -o -name plurals.xml \) -print0)
          exit $status
